<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="./result.html">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name" name="name">
        </div>
        <br>
        <div>
            <label for="email">Email</label>
            <input type="text" name="email" id="email" placeholder="Enter your email">
        </div>
        <br>
        <div>
            <label for="rating">Rating</label>
            <input type="radio" name="rating" value="Excellent" id="rating5"><label>5</label>
            <input type="radio" name="rating" value="Good" id="rating4"><label>4</label>
            <input type="radio" name="rating" value="Average" id="rating3"><label>3</label>
            <input type="radio" name="rating" value="Below Average" id="rating2"><label>2</label>
            <input type="radio" name="rating" value="Poor" id="rating1"><label>1</label>
        </div>
        <br>
        <div>
            <label for="service">Service</label>
            <select name="service" id="service">
                <option selected>select an service</option>
                <option value="House Keeping">House Keeping</option>
                <option value="Repair">Repair</option>
                <option value="Maintenance">Maintenance</option>
            </select>
        </div>
        <br>
        <div>
            <label for="feedback">Feedback</label>
        </div>
        <div>
            <textarea name="feedback" id="feedback" rows="3" cols="20" placeholder="Share your feedback"></textarea>
        </div>
        <br>
        <div>
            <input type="submit" value="submit">
        </div>
    </form>
</body>
</html>
